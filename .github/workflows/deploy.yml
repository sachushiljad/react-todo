name: Deploy React App to GCP VM

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      # 🔐 Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "${{ secrets.VM_IP }}" >> ~/.ssh/known_hosts

      # 🚀 Deploy (NO rsync — FIXED)
      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} << 'EOF'
            set -e

            cd /var/www/html || exit 1

            # if repo not cloned, clone it
            git pull origin main || git pull origin main

            npm install
            npm run build

            sudo systemctl restart nginx
          EOF